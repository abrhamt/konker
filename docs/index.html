<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konker - Ethiopian Rummy 41</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .links {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s;
        }
        a:hover {
            background: #764ba2;
        }
        .github-link {
            background: #333;
        }
        .github-link:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🃏 Konker</h1>
        <div class="subtitle">Ethiopian Rummy 41</div>
        <p>Welcome to Konker, an authentic implementation of the Ethiopian card game Rummy 41 (Konker).</p>
        <p>A real-time multiplayer game built with modern web technologies.</p>
        
        <div class="links">
            <a href="https://github.com/abrhamt/konker" class="github-link">📚 View on GitHub</a>
            <a href="#play">Learn More</a>
        </div>
    </div>
</body>
</html>
